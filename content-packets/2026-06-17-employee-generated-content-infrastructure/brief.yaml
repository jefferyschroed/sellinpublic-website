  company_context: "Mid-market and growth-stage B2B software companies that want employee expertise to support trust, education, and pipeline."
  pain: "The team has useful expertise in sales, product, support, and leadership, but most public content still reads like brand announcements or generic thought leadership."

business_goal: "Create a source-backed reference page that can rank, be cited by answer engines, and educate readers on employee-generated content."
sales_use_case: "Use as an educational asset when a prospect asks how employee-led public content differs from employee advocacy or founder-led posting."
