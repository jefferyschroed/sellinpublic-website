angle: "Employee-generated content is employee expertise turned into useful public learning, not a rewritten company announcement."
sell_in_public_pov: "The useful version starts with real work, preserves the employee's point of view, and teaches the reader something specific."
word_count_target: "1800-2200"

must_include:
  - "Answer-first definition near the top."
  - "Clear distinction between employee-generated content and employee advocacy."
  - "Evidence for why human expertise matters in B2B content."
  - "Examples from Clay, Lovable, and GitLab."
  - "Measurement guidance that looks beyond impressions."
  - "Copyable starter checklist."
  - "Sources section with current citations preserved."
must_avoid:
  - "Generic content marketing claims."
  - "Unsourced performance promises."
  - "Invented customer examples."
  - "Telling every employee to post on LinkedIn."
  - "Feature-heavy Sell In Public service language inside the article body."

source_requirements:
  min_grade: "B"
  banned_sources:
