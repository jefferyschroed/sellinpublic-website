  primary:
    label: "Book a Working Session"
    url: "https://calendly.com/jeff-tryquicksetters/30min"
  secondary:
    label: "Read the EGC Hub"
    url: "/blog/employee-generated-content-infrastructure/"

search_intent:
  stage: "how-to"
  primary_query: "how should B2B sales teams build LinkedIn content infrastructure"
  aeo_question: "How should B2B sales teams build LinkedIn content infrastructure?"
  primary_keyword: "LinkedIn content infrastructure for B2B sales teams"
  secondary_keywords:
    - "LinkedIn content strategy for B2B sales"
    - "B2B LinkedIn content infrastructure"
    - "sales team LinkedIn content system"
    - "LinkedIn content workflow for sales teams"
    - "employee-generated content infrastructure"
  related_questions:
    - "What should be included in a LinkedIn content infrastructure for sales teams?"
    - "How do sales teams turn buyer questions into LinkedIn posts?"
    - "How should LinkedIn content be measured beyond impressions?"
    - "How do sales and marketing work together on LinkedIn content?"

topic_map:
  pillar_id: "pillar-linkedin-led-gtm"
  pillar_name: "LinkedIn-Led GTM"
  topic_id: "topic-linkedin-content-infrastructure"
  topic_score: 80
  topic_decision: "create_or_refresh_packet"
