  parent_topic: ""
  target_asset: "post"
  source_readiness: "ready"
  internal_link_targets:
    - "/blog/employee-generated-content-infrastructure/"
    - "/blog/turn-employee-expertise-into-linkedin-posts/"
    - "/blog/founder-content-vs-employee-content/"
    - "/blog/measure-employee-generated-content-beyond-impressions/"
    - "/blog/grow-ai-search-visibility-linkedin-content/"

entity_targets:
  - "LinkedIn"
  - "B2B sales teams"
  - "Employee-generated content"
  - "Sales enablement"
  - "Founder content"
  - "Employee content"
  - "LinkedIn analytics"
  - "Content operations"
angle: "LinkedIn only helps sales when the team builds an operating system around expertise capture, credible voices, profile readiness, review, distribution, attribution, and sales feedback."
sell_in_public_pov: "LinkedIn should be treated as a distribution and signal layer supported by a repeatable content infrastructure, not as a pile of disconnected posts."
word_count_target: "1700-2200"

must_include:
  - "Direct answer to the AEO question near the top."
  - "Point-of-view capture from sales and customer conversations."
  - "Expert selection across founder, sales leader, AE, SDR, customer success, and product voices."
  - "Profile baseline, editorial calendar, review workflow, publishing cadence, attribution, sales feedback, and repurposing loops."
  - "Internal links to the EGC hub, expertise-to-post workflow, founder vs employee content, measurement beyond impressions, and AI search visibility article."
  - "Public examples from Microsoft and ClickUp LinkedIn posts, with source limits."
  - "FAQ section with non-empty, non-duplicative reader-facing questions."
must_avoid:
  - "Shared index, sitemap, feed, robots, shared CSS, shared JS, scripts, automation config, or topic coverage edits in this child worktree."
  - "Unsupported performance promises or invented customer results."
  - "Generic content strategy advice that could apply to any channel."
  - "Public copy that exposes QA notes, claim audit notes, or internal writing instructions."
  - "Banned words, banned phrases, em dashes, and binary correction-pair cadence."

source_requirements:
  min_grade: "B"
  banned_sources:
    - "Reddit/forums as evidence"
    - "generic listicles"
    - "unsourced stat roundups"
    - "autocomplete, PAA, query exports, trend inputs, or AI prompt outputs as factual evidence"
  required_source_types:
    - "Official LinkedIn platform guidance."
    - "Official LinkedIn analytics documentation."
    - "Public LinkedIn posts used only as example artifacts."
    - "Existing internal Sell In Public posts for internal links and category definitions."

approval:
  strategy_gate: true
  source_gate: true
  outline_gate: true
  qa_gate: true
  publish_gate: true

