audience:
  primary_buyer: "B2B founder, VP of Sales, CRO, or revenue operator"
  secondary_buyers:
    - "Marketing leader"
    - "Sales enablement leader"
    - "RevOps leader"
  company_context: "Mid-market B2B companies with active sales teams, useful field expertise, and no reliable LinkedIn operating system."
  pain: "LinkedIn content gets treated as optional rep homework, while useful sales insight stays trapped in calls, Slack threads, Gong clips, and deal reviews."

business_goal: "Create the LinkedIn-led GTM hub that connects employee-generated content, sales feedback, profile standards, commenting, measurement, and owned content repurposing."
sales_use_case: "Use when a prospect wants LinkedIn visibility to support sales conversations but does not want random personal-brand posting or disconnected content output."
