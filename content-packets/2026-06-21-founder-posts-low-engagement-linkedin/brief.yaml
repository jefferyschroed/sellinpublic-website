angle: "Founder posts usually get low engagement because the post is built around the company instead of the buyer, has no sharp first line, lacks a founder-owned point of view, and has no distribution loop through employees, comments, profile context, or sales follow-up."
sell_in_public_pov: "Low engagement is a diagnosis, not a verdict on the founder. The team should fix the audience, argument, comment plan, employee loop, profile context, cadence, and measurement before asking for more volume."
word_count_target: "1700-2100"

must_include:
  - "Direct answer to the Ahrefs-tracked AEO question in the first 150 words."
  - "H1 close to Why Founder Posts Get Low Engagement On LinkedIn."
  - "Diagnostic causes: wrong audience, weak first line, company news with no buyer stakes, no original point of view, poor comment strategy, no employee or team distribution loop, weak profile context, inconsistent cadence, and measuring the wrong engagement."
  - "Tie every cause to what the team should change."
  - "Internal link to /blog/employee-generated-content-infrastructure/."
  - "At least one relevant LinkedIn-led GTM or employee-generated content internal link."
  - "Approved primary sources only for factual claims."
  - "Short Sell In Public closing CTA with exactly two body sentences."
must_avoid:
  - "Publishing Ahrefs volume, ranking, click, or AI-search data."
  - "Reddit, forums, generic listicles, AI answers, or unsourced stat roundups as factual evidence."
  - "Generic advice to post more often without changing the operating system."
  - "Unsupported performance promises."
  - "Banned AI-ism words, phrases, em dashes, and binary correction pairs."
  - "Process or rubric language in public copy."

source_requirements:
  min_grade: "B"
  banned_sources:
    - "Reddit/forums as evidence"
    - "generic listicles"
    - "unsourced stat roundups"
    - "AI-generated summaries"
    - "autocomplete, PAA, query exports, trend inputs, Ahrefs prompt data, or AI prompt outputs as factual evidence"
  required_source_types:
    - "LinkedIn Help or LinkedIn Marketing official guidance for analytics, visibility, feed relevance, Pages, and profiles."
    - "LinkedIn-Edelman research if buyer expertise content claims are used."
    - "Approved internal SME notes for Sell In Public operating guidance framed as POV."

