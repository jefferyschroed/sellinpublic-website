audience:
  primary_buyer: "B2B founder, VP of Sales, CRO, or revenue operator"
  secondary_buyers:
    - "Marketing leader"
    - "Sales enablement leader"
    - "RevOps leader"
  company_context: "Mid-market B2B companies with active revenue teams, useful employee expertise, and a weak LinkedIn participation model."
  pain: "The company wants more credible LinkedIn reach, but employee advocacy often becomes a request for everyone to like, reshare, or paste the same brand message."

business_goal: "Create the LinkedIn employee advocacy answer page for B2B revenue teams and distinguish advocacy from employee-generated content without cannibalizing the existing comparison page."
sales_use_case: "Use when a prospect asks how to run employee advocacy on LinkedIn without flattening employee voices or creating generic brand amplification."
cta:
  primary:
    label: "Book a Working Session"
    url: "https://calendly.com/jeff-tryquicksetters/30min"
  secondary:
    label: "Read the EGC Comparison"
    url: "/blog/employee-generated-content-vs-employee-advocacy/"
  closing_blog_cta: "Use a short question-style heading when it fits. Keep the CTA body to exactly two sentences: one sentence that names Sell In Public and says we turn team expertise into LinkedIn content, buyer signals, and inbound leads, then run outbound to the right ICP; one sentence that invites a working session to see whether LinkedIn can become a top revenue channel for the company."

