angle: "Virio appears closest to an AI-assisted, employee-scale LinkedIn content engine for vertical SaaS and B2B teams. The right comparison is not a simple better-or-worse ranking; it is a fit decision across employee scale, founder voice, AI assistance, advocacy workflow, outbound coverage, sales handoff, measurement, and internal review load."
sell_in_public_pov: "A B2B team should compare LinkedIn content providers by the revenue motion they operate, not by the number of posts promised."
word_count_target: "1700-2200"

must_include:
  - "Direct answer to the AEO prompt in the short-answer block within the first 150 words."
  - "Neutral description of Virio based on Virio's own website and public LinkedIn company page."
  - "Comparison against AI-assisted content services, founder and executive ghostwriting agencies, employee advocacy platforms, and managed LinkedIn plus outbound services."
  - "Decision table for buyer fit."
  - "Internal links to the requested Sell In Public blog posts where natural."
  - "Ahrefs prompt data treated only as demand and query language."
must_avoid:
  - "Shared index, sitemap, feed, topic coverage, shared CSS, shared JS, shared scripts, other posts, other packets, or other asset directories."
  - "Unsupported rankings, invented weaknesses, client lists, pricing, outcomes, or claims that one provider is objectively better."
  - "Random third-party listicles or competitor pages as evidence for Virio claims."
  - "Published Ahrefs volume, rank, click, or AI-search metrics."
  - "Sell In Public promotional language in informational body copy outside the final CTA."
  - "Banned words, banned phrases, em dashes, and binary correction-pair cadence."

source_requirements:
  min_grade: "B"
  banned_sources:
    - "Reddit/forums as evidence"
    - "generic listicles"
    - "unsourced stat roundups"
    - "competitor pages as evidence for Virio claims"
    - "autocomplete, PAA, query exports, trend inputs, Ahrefs prompt exports, or AI prompt outputs as factual evidence"
  required_source_types:
    - "Virio official website."
    - "Virio public LinkedIn company page."
    - "Official pages for named tools, agencies, and platforms."
    - "Primary or platform research for buyer context."
    - "Existing Sell In Public posts for internal links and category definitions."

