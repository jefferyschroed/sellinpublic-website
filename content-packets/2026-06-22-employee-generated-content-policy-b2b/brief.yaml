  source_readiness: "ready"
  internal_link_targets:
    - "/blog/employee-generated-content-infrastructure/"
    - "/blog/employee-generated-content-vs-employee-advocacy/"
    - "/blog/scale-employee-generated-content-linkedin/"
    - "/blog/"

entity_targets:
  - "Employee-generated content"
  - "Social media policy"
  - "FTC Endorsement Guides"
  - "Material connection disclosure"
  - "LinkedIn Professional Community Policies"
  - "Confidential information"
  - "Customer reference approval"
  - "Protected concerted activity"
  - "Regulation FD"
  - "EEOC harassment guidance"
angle: "A B2B employee-generated content policy should work like a decision system: clear disclosure rules, confidential-information boundaries, customer-name rules, claims review, employee-rights carveouts, platform conduct rules, and fast review lanes that preserve employee voice."
sell_in_public_pov: "The right policy gives employees a clearer field to play on. It should reduce risky improvisation without turning every useful field note into sterile brand copy."
word_count_target: "1700-2100"

must_include:
  - "Direct answer to the AEO question near the top."
  - "Clear note that the article is operating guidance, not legal advice."
  - "Disclosure guidance tied to FTC material connection language and LinkedIn policy."
  - "Practical rules for confidential information, customer names, product claims, AI claims, and competitive claims."
  - "Review lanes that separate low-risk profile-native posts from customer, legal, HR, claims, or public-company sensitive posts."
  - "Reminder that social media policies should not override protected employee rights."
  - "Publicly available company policy examples from primary or first-party sources."
  - "Internal links to the employee-generated content infrastructure, advocacy comparison, and scaling guides."
  - "Copyable employee-generated content policy checklist."
must_avoid:
  - "Legal advice or jurisdiction-specific instructions."
  - "Invented statutes, fake examples, fake customer scenarios, or unsupported compliance claims."
  - "Blanket statements that employees can or cannot post about workplace matters."
  - "Generic brand-safety advice without a B2B content workflow."
  - "Feature-heavy Sell In Public service language inside the educational body."

source_requirements:
  min_grade: "B"
  banned_sources:
    - "Reddit/forums as evidence"
    - "generic listicles"
    - "unsourced stat roundups"
    - "autocomplete, PAA, query exports, trend inputs, or AI prompt outputs as factual evidence"
  required_source_types:
    - "Official FTC endorsement and disclosure guidance."
    - "Official LinkedIn policy pages."
    - "Government guidance for protected concerted activity, harassment, and public-company disclosure context."
    - "Public company, university, or first-party social media policy examples."

