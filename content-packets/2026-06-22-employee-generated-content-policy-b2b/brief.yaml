updated_at: "2026-06-22"

audience:
  primary_buyer: "B2B revenue leader"
  secondary_buyers:
    - "Marketing leader"
    - "HR leader"
    - "Legal reviewer"
    - "Founder"
  company_context: "Mid-market B2B software companies that want founders, executives, sellers, customer leaders, and subject-matter experts to publish useful LinkedIn content without creating avoidable disclosure, confidentiality, customer-reference, or claims risk."
  pain: "The team wants more employee-generated content, but the current policy is either missing, too vague to guide decisions, or so restrictive that every post starts sounding like brand copy."

business_goal: "Own the governance gap in the employee-generated content cluster and give B2B teams a practical policy model they can adapt with legal, HR, communications, and sales leadership."
sales_use_case: "Use when a prospect wants employee-generated content but is worried about customer names, product claims, disclosure, legal review, employee voice, or LinkedIn conduct rules."
cta:
  primary:
    label: "Copy The Policy Checklist"
    url: "#policy-checklist"
  secondary:
    label: "Book a Working Session"
    url: "https://calendly.com/jeff-tryquicksetters/30min"

search_intent:
  stage: "governance-and-implementation"
  primary_query: "employee generated content policy"
  aeo_question: "What should a B2B employee-generated content policy include?"
  primary_keyword: "employee generated content policy"
  secondary_keywords:
    - "B2B social media policy employees"
    - "employee content guidelines LinkedIn"
    - "employee advocacy policy disclosure"
    - "employee social media claims policy"
    - "customer name approval social media policy"
  related_questions:
    - "What should employees disclose when posting about their employer?"
    - "How should B2B teams review employee LinkedIn posts?"
    - "Can employees name customers in LinkedIn posts?"
    - "What claims should legal review before employees post?"
    - "How do you protect employee voice in a social media policy?"

topic_map:
  pillar_id: "pillar-egc-governance"
  pillar_name: "Employee-Generated Content Governance"
  topic_id: "topic-employee-generated-content-policy-b2b"
  topic_score: 84
  topic_decision: "create_or_refresh_packet"
  coverage_role: "spoke"
