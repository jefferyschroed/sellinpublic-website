  - "Two-pass review workflow: risk first, voice second."
  - "Guidance for legal, brand, and executive review without legal advice."
  - "FTC disclosure context for employee endorsements and material connections."
  - "LinkedIn policy context on false or misleading content and clear notices for personal benefit."
  - "FINRA context for regulated teams that need supervision and recordkeeping."
  - "Copyable review checklist."
  - "Internal links to the EGC infrastructure, scale EGC, and turn employee expertise posts."
  - "Final CTA that names Sell In Public and has exactly two body sentences."
must_avoid:
  - "Invented laws, statistics, examples, or quotes."
  - "Treating all employee posts as ads or legal-risk content."
  - "Public legal advice."
  - "Flattening every voice into generic brand language."
  - "Shared index, sitemap, feed, CSS, JS, script, or topic-coverage edits in this child worktree."

