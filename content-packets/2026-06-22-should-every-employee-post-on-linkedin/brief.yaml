  - "Employee advocacy"
  - "B2B sales"
  - "Revenue teams"
  - "LinkedIn Pages"
  - "Employee Notifications"
  - "Professional brand"
angle: "Every employee should not be expected to publish original LinkedIn posts. B2B teams should build a role-based participation model where credible employees publish, adjacent employees comment or share privately, and broad advocacy stays voluntary and context-led."
sell_in_public_pov: "Employee-generated content works when the company captures credible expertise from the people closest to the buyer problem. It should not become a company-wide quota or a generic reshare program."
word_count_target: "1700-2200"

must_include:
  - "Direct answer to the AEO question near the top."
  - "Clear distinction between original employee-generated content, employee advocacy, forced posting quotas, and generic reshare programs."
  - "Role-based participation model for founders, executives, sales leaders, reps, subject-matter experts, and adjacent employees."
  - "Practical workflow for deciding who should publish, comment, send privately, or sit out."
  - "Source-backed LinkedIn participation and professional-profile context."
  - "Internal links to EGC hub, EGC vs advocacy, LinkedIn employee advocacy, and LinkedIn content infrastructure."
must_avoid:
  - "Shared index, sitemap, feed, topic coverage, shared CSS, shared JS, shared scripts, other posts, other packets, or other asset directories."
  - "Unsupported statistics, invented examples, fake quotes, or generic reshare-program advice."
  - "Public source-policy, QA, claim-ledger, or internal process language."
  - "Sell In Public mentions in informational body copy except author context and the final CTA."
  - "Banned words, banned phrases, em dashes, and binary correction-pair cadence."

source_requirements:
  min_grade: "B"
  banned_sources:
    - "Reddit/forums as evidence"
    - "generic listicles"
    - "unsourced stat roundups"
    - "autocomplete, PAA, query exports, trend inputs, or AI prompt outputs as factual evidence"
  required_source_types:
    - "Official LinkedIn participation, visibility, profile, notification, or analytics documentation."
    - "Primary B2B research for buyer/professional-expertise context."
    - "Existing internal Sell In Public posts for category distinctions and internal links."

